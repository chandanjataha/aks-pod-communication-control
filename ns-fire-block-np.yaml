apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: deny-firefox 
  namespace: ns-nginx 
spec:
  podSelector:
    matchLabels:
      rule: nginxrule
  policyTypes:
  - Ingress
  ingress:
  - from:
      - namespaceSelector: 
           matchLabels: 
             name: nginx

# commit-marker-3: restrict ingress to ns-nginx only
